version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: vfm_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  backend:
    build:
      context: ./server
    container_name: vfm_backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/VirtualFarmMarketDB
      - PORT=3001
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./client/Virtual-Farm-Market
    container_name: vfm_frontend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongodb_data:
